- id: region
  name: "Покупка без пошлин и ебатории"
  priority: "Bonus"
  weight: 4
  description: "Плюс, если телефон доступен в РФ/АМ/ЕАЭС по нормальной цене: без форвардера, сложной доставки, пошлины и лишнего геморроя. Официальная/понятная гарантия приятна, но не критична."
  fail: "Не валит выбор само по себе; просто штрафует варианты, где надо считать пошлину, доставку, форвардера, ждать, рисковать возвратом или разбираться с мутной карточкой."
  check: "Сравнить локальную цену РФ/АМ/ЕАЭС, доставку, пошлину, возврат, гарантию, отзывы по продавцу и возможность проверить товар до получения."
- id: esim
  name: "eSIM + физическая SIM"
  priority: "Must"
  weight: 12
  description: "Поездки/Европа: eSIM отдельно, основная физическая SIM отдельно."
  fail: "Нет eSIM или регион без eSIM."
  check: "Settings -> SIM/eSIM, EID, Add eSIM; сверить модель/регион."
- id: speed
  name: "Повседневная скорость связки SoC/RAM/прошивка"
  priority: "Must"
  weight: 12
  description: "Проверка результата от процессора, оперативки, накопителя и прошивки: карты, Telegram, браузер, заметки, почта, банки, GPT/Notion, переводчик и мелкие быстрые действия должны идти без тупняков."
  fail: "Микролаги, долгие запуски, подвисания UI, ожидание при простых задачах, ощущение 'телефон мешает жить'. Причина может быть в SoC, RAM, памяти или прошивке."
  check: "15 минут: камера -> карты/2ГИС -> Telegram -> браузер -> заметка/Notion -> Gmail/Outlook -> банк -> поиск -> назад."
- id: multitasking
  name: "Многозадачность без вылетов"
  priority: "Must"
  weight: 11
  description: "Telegram не должен вылетать при запуске карт, карты - при запуске Telegram/браузера, музыка/MX Player/Teams/Outlook/Syncthing не должны постоянно умирать в фоне."
  fail: "Telegram/карты/браузер/Teams перезапускаются при обычном переключении, фоновые сервисы режутся, аудио/навигация прерываются."
  check: "Открыть Telegram, 2ГИС, Google Maps, браузер, Teams, Outlook, MX Player/музыку, Syncthing; 10-15 минут переключаться и оставить фоновые задачи."
- id: future
  name: "Запас на 2-3 года"
  priority: "Must"
  weight: 10
  description: "Телефон должен не превратиться в тыкву через 2-3 года: флагманский/около-флагманский SoC, 12-16 ГБ RAM, нормальные обновления, адекватный теплопакет."
  fail: "Слабый SoC, 8 ГБ RAM, плохая поддержка, нагрев/троттлинг в обычных задачах, сомнительная долгосрочная прошивка."
  check: "About phone + CPU-Z/AIDA64; security patch; 15-20 минут навигация/камера/браузер и проверить нагрев."
- id: camera_stable
  name: "Камера стабильно лучше S10 и не бесит"
  priority: "Must"
  weight: 13
  description: "Нужна хорошая и стабильная камера, а не игрушка со странной обработкой: фото лучше S10, видео без адской дёрганости, нормальная фронталка, предсказуемый быстрый снимок."
  fail: "Дерганое видео, странный HDR, мыло вечером, плохой автофокус, сильные галлюцинации обработки, 'китайский' вид картинки по цене флагмана."
  check: "Комната вечером, движение, текст/чеки, люди/лица, 1x/ширик/телевик, фронталка, видео 4K ходьбой; отдельно смотреть свежие обзоры после обновлений."
- id: firmware
  name: "Прошивка без китайских костылей"
  priority: "Must"
  weight: 12
  description: "Прошивка должна работать нормально из коробки: уведомления, банки, Teams/Outlook, Gmail, Google, Syncthing, фоновые задачи без долгого допиливания."
  fail: "Китайские костыли, кривые уведомления, агрессивное убийство приложений, рекламный мусор, необходимость перепрошивать или часами настраивать базовые вещи."
  check: "Telegram/Gmail/Teams push; battery restrictions; Syncthing overnight; автозапуск/фоновые разрешения; поискать жалобы именно по Global/текущей версии ПО."
- id: gpay
  name: "Google Pay / Google apps"
  priority: "Must"
  weight: 6
  description: "Google Wallet/Pay критичен; также нужны нормальные Google apps, Play Services, Maps, Gmail, банки и скидочные приложения."
  fail: "CN-прошивка, broken Play Integrity, нет NFC/Wallet."
  check: "Play Store certified, Wallet card, NFC, банки, Play Integrity по возможности."
- id: unlock
  name: "Разблокировка"
  priority: "Must"
  weight: 6
  description: "Быстро и четко, без регулярного PIN."
  fail: "Медленный/капризный fingerprint/face."
  check: "2 пальца; 20 unlock сухим/влажным пальцем; face в комнате."
- id: ldac
  name: "LDAC"
  priority: "Must"
  weight: 5
  description: "Для беспроводных наушников/музыки."
  fail: "Нет LDAC или кодек недоступен с твоими наушниками."
  check: "Developer options -> Bluetooth audio codec с твоими наушниками."
- id: storage256
  name: "Память 256 ГБ+"
  priority: "Must"
  weight: 7
  description: "Минимум 256 ГБ; меньше не рассматривать. SD-карта приятна, но не обязательна."
  fail: "<256 ГБ."
  check: "About phone -> Storage; сверить SKU коробка/система."
- id: storage512
  name: "512 ГБ"
  priority: "Bonus"
  weight: 4
  description: "Сильный плюс: сейчас 170 ГБ хватает, но запас приятен."
  fail: "Не валит выбор, если есть 256+ и цена хорошая."
  check: "Сверить SKU/коробку/систему; посмотреть доступное место после настройки."
- id: value
  name: "Цена / value относительно задачи"
  priority: "High"
  weight: 15
  description: "30к - без сожалений, 60к нормально, 80к уже 'ну такое', 100к - психологический потолок только за ультимативный вариант. Серый импорт допустим ради экономии, если риск осознан."
  fail: "Оверпрайс без явного выигрыша по главным сценариям, цена близко к 100к при серьезных рисках, 'на 10-20% лучше текущего' за флагманские деньги."
  check: "Сравнить WB/Ozon/Amazon/UAE/локальных продавцов landed price, возврат, регион, отзывы, гарантию и риск получить не ту версию."
- id: quick_photo
  name: "Быстрое фото 'достал -> щелкнул -> норм'"
  priority: "High"
  weight: 10
  description: "Быстрый запуск камеры, желательно двойным нажатием кнопки блокировки или аналогичным жестом; нормальный автофокус, минимум смаза, без возни."
  fail: "Камера долго стартует, ловит фокус, смазывает, видео/фото требуют возни."
  check: "Двойное нажатие/shortcut; 10 быстрых кадров в помещении/на улице."
- id: battery_hike
  name: "Батарея для 10-11 часов GPS-хайка"
  priority: "High"
  weight: 10
  description: "Идеал: 10-11 часов трекинга GPS + периодические карты и ещё 2-3 часа на такси/связь. Powerbank допустим, но хороший автономный запас сильно решает."
  fail: "Маленькая батарея + высокий расход GPS/экран/нагрев; сценарий 'заряжать 3 раза в день' повторяется."
  check: "1-2 часа Organic Maps/Wikiloc/Google Maps: %/час, нагрев, GPS lock; первый хайк с powerbank; смотреть реальные тесты навигации."
- id: ergonomics
  name: "Эргономика: вес / толщина / удобство без чехла"
  priority: "High"
  weight: 9
  description: "Текущий S10 нравится тонкостью и удобством; диагональ терпима, но тяжелая лопата хуже компромисса по батарее."
  fail: ">220 г, толстый/скользкий корпус, плохо лежит в руке/кармане, ощущение кирпича."
  check: "Подержать 5-10 минут; одной рукой; карман; сравнить с S10."
- id: durability
  name: "Прочность / материалы / жизнь без чехла"
  priority: "High"
  weight: 8
  description: "Телефон регулярно падает, чехлы не любим; важны материалы, стекло, рамка, IP, хват и устойчивость блока камер на столе."
  fail: "Скользкий стеклянный кирпич, слабая защита, огромный выступ камер без нормальной устойчивости."
  check: "Осмотр корпуса, IP/стекло по спекам, grip-test сухой рукой, стол/качание."
- id: bands
  name: "Нормальная связь в поездках: модем, bands, GPS, Европа/Армения"
  priority: "High"
  weight: 9
  description: "Нормальный процессор с нормальным модемом и частотами; 5G приятен, но стабильные LTE/5G bands, GPS и работа в поездках важнее."
  fail: "Урезанные bands, плохой GPS lock, региональная версия без нужных частот, печка/модемные глюки."
  check: "SKU/region, LTE/5G bands, GPS на улице, звонок/инет, hotspot, роуминговая/eSIM проверка."
- id: shortcut
  name: "Быстрый фонарик / shortcut без разблокировки"
  priority: "High"
  weight: 6
  description: "Аналог Bixby-кнопки или удобный жест/кнопка/shortcut."
  fail: "Нельзя быстро назначить фонарик/режимы/плеер без разблокировки."
  check: "Buttons/Gestures: double press/hold/key shortcuts; фонарик с заблокированного экрана."
- id: screen_sound
  name: "Экран/динамики"
  priority: "Medium"
  weight: 4
  description: "AMOLED уважается, важна нормальная цветопередача; 120 Гц не критичны. Динамики нужны для аудиокниг/подкастов, иногда в душе."
  fail: "Тусклый экран, плохие динамики, неприятные цвета без нормального режима, голоса звучат грязно."
  check: "Natural/Vivid, яркость на улице, аудиокнига на 70-90%, голоса без хрипа."
- id: windows
  name: "Windows-связка"
  priority: "Bonus"
  weight: 3
  description: "Связка с Windows у Samsung очень любима и часто используется, но ради батареи/камеры/общей адекватности от неё можно отказаться."
  fail: "Не валит выбор."
  check: "Phone Link/Link to Windows: уведомления, фото, звонки, копипаста."
- id: design
  name: "Дизайн / необычность / удовольствие от вещи"
  priority: "Bonus"
  weight: 3
  description: "Компактность, тонкость, лёгкость и необычность радуют; хочется вещи, которая не только рациональна, но и немного выделяется."
  fail: "Не валит выбор, если телефон объективно лучше."
  check: "Вживую/фото: цвет, фактура, блок камер, тактильность."
- id: sd
  name: "SD-карта"
  priority: "Bonus"
  weight: 1
  description: "Приятно, но не критично."
  fail: "Не валит выбор."
  check: "Проверить слот/спеки."
- id: wireless
  name: "Беспроводная зарядка"
  priority: "Пофиг"
  weight: 0
  description: "Не влияет на решение; наличие приятно только как бесплатный бонус."
  fail: "Не валит выбор."
  check: "Просто отметить наличие."
- id: dev_testing
  name: "Разработка / тестирование мобильных приложений"
  priority: "Bonus"
  weight: 2
  description: "Телефон должен быть удобен как тестовое Android-устройство: ADB, стабильный USB, нормальная передача файлов/логов, без региональных сюрпризов с developer options."
  fail: "Не валит выбор само по себе, но штрафует варианты, где ADB/USB/отладка ведут себя нестабильно или требуют плясок."
  check: "Включить Developer options, USB debugging, подключить к Windows/Mac, проверить adb devices, передачу файлов, логи и стабильность кабельного соединения."
