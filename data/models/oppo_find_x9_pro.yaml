  updates: {status: "✅", score: 0.82, note: "Для Global в обзорах указывают 5 major Android versions / 6 years updates. Chinese Spec и серые поставки считать отдельным риском OTA/сервиса."}
  camera_stable: {status: "✅", score: 0.84, note: "Очень сильные фото, натуральнее Vivo/Honor по лицам и заметно лучше OnePlus 15; 3x-телевик, портреты, макро и фронталку часто хвалят. Риски: без fast/action mode смазывает движущиеся объекты, AI/шумодав иногда дорисовывает ресницы, текст, деревья и дальний зум, HDR/пересветы, краснота лиц, слабый ночной ультраширик и рывки/лесенка в видео при резких панорамах."}
  firmware: {status: "⚠️", score: 0.72, note: "Global ColorOS 16 быстрая, с Google-лентой, eSIM и уведомлениями почти без настройки. Китайская версия дешевле, но без eSIM, с ручной установкой Play/клавиатуры, без Google Quick Share/Wear OS кроме Samsung, остаточной китайщиной, частью AI только на китайском и настройкой уведомлений; ранние прошивки имели баги камеры/передачи файлов."}
