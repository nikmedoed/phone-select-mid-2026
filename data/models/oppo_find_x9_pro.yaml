  shortcut: {status: "✅", score: 0.82, note: "Левая кнопка удобна для беззвука/фонарика/режимов, камера-кнопка запускает камеру и зум; но кастомизация ограничена встроенными действиями без выбора своего приложения, а камера-кнопку часть обзорщиков считает бесполезной или низко расположенной."}
