criteria:
  region: {status: "⚠️", score: 0.65, note: "Есть RU/global продажи и дешевые CN-варианты. CN в обзорах работает на русском с Google и bands, но требует настройки; у EU батарея меньше, цену/гарантию/возврат считать по SKU."}
  esim: {status: "⚠️", score: 0.65, note: "Global/UAE/EU/HK вероятно с eSIM, но CN не считать eSIM-версией. Обязательная проверка EID/Add eSIM на коробке или в *#06# до оплаты."}
  speed: {status: "✅", score: 1, note: "Snapdragon 8 Elite Gen 5; несколько обзоров хвалят производительность, игры и стабильность."}
  multitasking: {status: "✅", score: 1, note: "16 ГБ RAM."}
  future: {status: "⚠️", score: 0.82, note: "Железо сильное, но 7 лет Android/security официально надежнее переносить на EU/UK. Для UAE/HK/серого Global считать поддержку ниже, для CN — отдельный риск регионального софта и политики обновлений."}
  camera_stable: {status: "⚠️", score: 0.8, note: "Очень сильный tele/night/портрет и 200 МП tele, но не лучший all-round video-phone: видео уступает лучшим, обработка/HDR иногда агрессивные, цвета Honor и selfie надо проверить лично."}
  firmware: {status: "⚠️", score: 0.68, note: "MagicOS 10 быстрая и богатая. Global проще; CN usable, но нужен ручной Google/фон, местами английский/китайский, AI и облако зависят от региона. Есть отзыв о Telegram, который засыпал даже после настройки."}
  gpay: {status: "⚠️", score: 0.78, note: "NFC/Google-сервисы и бесконтактную оплату в CN-обзоре подтверждали, но Wallet/Play Integrity/банки проверять на фактическом SKU; отмечали, что к NFC-метке надо привыкнуть."}
  unlock: {status: "✅", score: 1, note: "Сильный плюс: полноценный 3D Face ID работает днём/ночью и в банковских приложениях; ультразвуковой FP тоже быстрый."}
  ldac: {status: "✅", score: 1, note: "Официально заявлены LDAC, aptX HD, aptX Lossless и LC3; отдельно проверить codec negotiation с твоими наушниками."}
  storage256: {status: "✅", score: 1, note: "1 ТБ."}
  storage512: {status: "✅", score: 1, note: "16/1TB."}
  value: {status: "⚠️", score: 0.6, note: "Для подтвержденного Global/UAE/HK 16/1TB с eSIM и 7100 мАч за ~97к value скорее средний: дорого, но не провал. Для CN/no-eSIM или EU 6270 по той же цене оценка ближе к 0.35-0.45."}
  quick_photo: {status: "✅", score: 0.88, note: "Есть отдельная кнопка камеры: двойное нажатие запускает камеру, удержание можно настроить на видео/серию, зум работает осознанно в горизонтальном хвате; нужно проверить защиту от случайных касаний."}
  battery_hike: {status: "✅", score: 0.92, note: "7100/7200 мАч версии очень сильны: несколько обзоров дают 8-12 ч экрана, 1.5-2 дня, один тест навигации на максимальной яркости съел 15%/час. EU 6270 мАч проверять отдельно."}
  ergonomics: {status: "⚠️", score: 0.7, note: "219-225 г, но корпус уже/тоньше предшественника, покатые грани и баланс часто хвалят; без чехла удобнее, в чехле спинка становится плоской. Блок камер большой, подержать без чехла."}
  durability: {status: "⚠️", score: 0.78, note: "IP68/IP69/IP69K и SGS-прочность упоминаются, комплектный чехол и пленка есть; изогнутый экран повышает риск жизни без стекла, а блок камер/вес надо проверить в руке и на столе."}
  bands: {status: "⚠️", score: 0.75, note: "Не верить общим словам из обзоров: сверить bands по model number/SKU. Для Армении/Европы отдельно проверить LTE B3/B7/B20/B28 и 5G n78/n28/n1/n3/n7/n40/n41."}
  shortcut: {status: "⚠️", score: 0.78, note: "Camera/AI button полезна в камере, но не универсальна. Зато в MagicOS есть отдельные жесты/кнопки: двойное нажатие питания или volume down можно назначать на фонарик/диктофон/приложение."}
  screen_sound: {status: "✅", score: 1, note: "Экран и звук - сильные стороны по нескольким обзорам; звук громкий/басовитый, экран яркий и комфортный для глаз."}
