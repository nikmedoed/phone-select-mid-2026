  value: {status: "⚠️", score: 0.58, note: "За ~97к value средний: аппарат сильный, но заметно дороже OnePlus 15. EU-версия с 6270 мАч по той же цене хуже."}
  quick_photo: {status: "✅", score: 0.86, note: "Быстрый запуск и сильная камера. Кнопку камеры проверить на случайные нажатия и удобство одной рукой."}
  battery_hike: {status: "⚠️", score: 0.86, note: "7100/7200 мАч дают сильный запас для навигации и долгого дня, но оценка зависит от SKU. EU 6270 мАч заметно хуже; перед покупкой обязательно проверить регион и ёмкость."}
  ergonomics: {status: "⚠️", score: 0.6, note: "219-225 г почти у границы штрафа, плюс большой блок камер и изогнутый экран. Баланс хвалят, но без чехла обязательно подержать."}
  durability: {status: "⚠️", score: 0.72, note: "IP69K и комплектные чехол/пленка - плюс. Штраф за жизнь без чехла: изогнутый экран, крупный корпус и большой выступающий блок камер."}
  bands: {status: "✅", score: 0.86, note: "У рассматриваемой Global-версии ожидается нормальный набор LTE/5G bands для Европы/Армении, включая ключевые B3/B7/B20/B28. Чуть ниже OnePlus/Samsung из-за региональных отличий Honor."}
  shortcut: {status: "⚠️", score: 0.78, note: "Кнопка камеры полезна, но не универсальна. Фонарик можно закрыть жестами/кнопками MagicOS."}
  screen_sound: {status: "✅", score: 0.93, note: "Очень яркий LTPO OLED с высоким PWM и один из самых сильных звуков. Не 4/4 из-за изогнутого экрана: проверить блики и случайные касания."}
  windows: {status: "⚠️", score: 0.7, note: "Phone Link должен закрыть общий буфер, уведомления и фото/файлы через Windows. Ниже Samsung/OPPO из-за менее явной фирменной PC-связки; проверить copy/paste и доступ к фото при настройке."}
