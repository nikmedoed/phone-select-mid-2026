  camera_stable: {status: "⚠️", score: 0.8, note: "Сильные фото, портреты, ночь и телевик. Риски: видео не лучшее в классе, HDR/цвета Honor и селфи требуют проверки."}
  firmware: {status: "⚠️", score: 0.84, note: "Настоящий Global должен быть с Google из коробки, без перепрошивки. Отдельно проверить фон/уведомления: Telegram/Teams/Gmail/Syncthing после ночи."}
  gpay: {status: "✅", score: 1, note: "У рассматриваемой Global-версии Google-сервисы, NFC и Wallet должны работать."}
  unlock: {status: "✅", score: 1, note: "Сильный плюс: полноценный 3D Face ID работает днём/ночью и в банковских приложениях; ультразвуковой FP тоже быстрый."}
  ldac: {status: "✅", score: 1, note: "Официально заявлены LDAC, aptX HD, aptX Lossless и LC3; отдельно проверить codec negotiation с твоими наушниками."}
