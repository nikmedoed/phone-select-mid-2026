criteria:
  region: {status: "✅", score: 0.9, note: "WB Brand Flagship Store даёт понятную покупку без пошлины: 66-68к за US CPH2749 с eSIM, но всего 2 оценки по текущим карточкам. Неподходящие версии без EID/eSIM не штрафуют модель, а отсекаются на проверке карточки."}
  esim: {status: "✅", score: 1, note: "Для сравнения считается только Global/EU/US/India SKU с nano-SIM + eSIM. CN/прошитый CN без EID не рассматривать."}
  speed: {status: "✅", score: 0.96, note: "Флагманский Snapdragon и 16 ГБ RAM; в быту очень быстрый и плавный. В speed-test S26 Ultra чуть быстрее запускает часть приложений, но OnePlus ощущается плавнее и лучше листает недавние; под тяжёлой нагрузкой риск нагрева/лимитов всё равно проверить."}
  multitasking: {status: "✅", score: 0.95, note: "16 ГБ RAM и обычное удержание приложений проблем не вызывают; battery restrictions всё равно снять для Teams/Outlook/Syncthing."}
  future: {status: "✅", score: 0.92, note: "Новый флагманский Snapdragon, 16 ГБ RAM и быстрый накопитель дают хороший запас. В игровых тестах держит War Thunder/Genshin/CarX около 40-43°C и не гасит яркость, но в стандартном режиме 3D-нагрузка может греть корпус до ~50°C."}
  updates: {status: "✅", score: 0.85, note: "Свежий Android 16/OxygenOS 16; срок поддержки хороший, но короче Samsung и зависит от региона/ветки прошивки."}
  camera_stable: {status: "⚠️", score: 0.5, note: "Камера нормальная для value-флагмана и флагманская по функциям, но не причина брать модель: хорошая дневная/универсальная, сильная для action/burst, однако уступает OPPO Find X9 Pro/Vivo/Samsung/iPhone по стабильности, сенсорам, tele/ultrawide, low-light и видео. Относительно OnePlus 13 это не однозначный тотальный даунгрейд, но есть риск меньшей камерофонности из-за отказа от Hasselblad и сенсорной базы; перед покупкой смотреть реальные вечерние фото. 4K60 и AF есть на всех камерах, фронталка с AF хорошая, но tele мелкий: 7x ещё терпимо для табличек, дальше мыло/AI; tele около 40 см минимальной фокусировки и не годится для close-up/macro; ночной режим с длинной выдержкой плохо подходит для движения, встречались жалобы на плавающий фокус."}
  firmware: {status: "⚠️", score: 0.82, note: "OxygenOS/ColorOS на подходящем Global/US/EU/India SKU хвалят за плавность, клон телефона, жесты, Portal/AI, O+ Connect, кастомизацию, AOD с открытыми уведомлениями и удобный обмен с Apple/Mac; battery restrictions снять. AI/диктофон/переписывание текста частично работают на русском, языковые пакеты и функции меняются. Global без китайщины, но с Google-звонилкой и без записи звонков."}
  gpay: {status: "⚠️", score: 0.85, note: "В обзорах Global отмечали работу Mir Pay/NFC; для Google Wallet всё равно проверить Play Integrity и регион."}
