  quick_photo: {status: "⚠️", score: 0.66, note: "Plus Key и жесты на выключенном экране есть; speed-test показал быстрый shutter. Быстрый снимок всё равно проверять вечером/в помещении: ночной ширик/tele, HDR и стабилизация видео слабее конкурентов."}
  battery_hike: {status: "✅", score: 0.96, note: "7300 мАч; обзоры хвалят автономность: полтора-два дня и 8-12 ч экрана обычны, у долгого владельца 10-14 ч экрана, рекорд 14,5 ч за 2 дня, в сравнении с Poco давал 10-12 ч, в стресс-тесте против iPhone/Samsung прожил 13 ч 47 мин. GPS-сценарий всё ещё проверить отдельно."}
  ergonomics: {status: "⚠️", score: 0.62, note: "211-218 г; крупный, но легче/тоньше iPhone Pro Max, плоский экран, компактный блок камер и текстурная спинка делают хват приятнее, чем у многих лопат/Vivo-шайб; мнения по брусковой форме разделились, часть владельцев ругает рубленые грани, ширину, высокое расположение кнопок, софт-тач спинки и потерю старого Alert Slider."}
  durability: {status: "⚠️", score: 0.78, note: "IP68/IP69 подтверждаются чаще всего; IP69K встречается в обзорах/региональных материалах, но сверять по SKU. Victus 2 по WB, плоский экран проще защищать; спинка практичная по отпечаткам и мелкие следы часто стираются, но следы от ногтей/царапины на покрытии проверить, а Global часто требует сразу докупить чехол."}
