criteria:
  region: {status: "⚠️", score: 0.75, note: "WB Brand Flagship Store, 9 оценок; US/Global/India/CN отличаются комплектом и софтом. Global спокойнее, India интересна блоком и звонилкой, CN/перешивка дешевле, но с риском блокировок, OTA и неполной русификации."}
  esim: {status: "⚠️", score: 0.88, note: "Global/US/India должны иметь eSIM, но перед выкупом нужен конкретный SKU и EID/Add eSIM в настройках; китайскую PLK110/прошитый CN не брать, если eSIM нужна: после перепрошивки EID не появляется, адаптеры eSIM возможны, но это отдельный костыль."}
  speed: {status: "✅", score: 0.96, note: "Флагманский Snapdragon и 16 ГБ RAM; в быту очень быстрый и плавный. В speed-test S26 Ultra чуть быстрее запускает часть приложений, но OnePlus ощущается плавнее и лучше листает недавние; под тяжёлой нагрузкой риск нагрева/лимитов всё равно проверить."}
  multitasking: {status: "✅", score: 0.95, note: "16 ГБ RAM, запас хороший; обычное удержание приложений проблем не вызывает, но split-screen и перенос с Samsung менее удобны, часть приложений не поддерживает разделение экрана."}
  future: {status: "✅", score: 0.9, note: "Новый флагманский чип и свежая ОС; долгие обзоры считают запас на годы хорошим. Проверить нагрев при видео/навигации: под синтетикой встречались 41-50°C и 25-30% падения, хотя в быту/играх жалоб меньше."}
  camera_stable: {status: "⚠️", score: 0.48, note: "Камера нормальная для value-флагмана, но не причина брать модель: заметно уступает OPPO Find X9 Pro/Vivo/iPhone по сенсорам, tele и low-light; Samsung/iPhone сильнее по видео/фронталке. Днем фото часто приятные, 4K60 и AF есть на всех камерах, фронталка с AF хорошая, но tele мелкий: 7x ещё терпимо для табличек, дальше мыло/AI; ночной режим с длинной выдержкой плохо подходит для движения, встречались жалобы на плавающий фокус."}
  firmware: {status: "⚠️", score: 0.78, note: "OxygenOS/ColorOS хвалят за плавность, клон телефона, жесты, Portal/AI и O+ Connect; battery restrictions снять. Global без китайщины, но с Google-звонилкой и без записи звонков. CN/прошитый на Oxygen дешевле и по одному 6-месячному опыту получает OTA, Google/Wear OS и пуши работают, но нет eSIM и возможны автояркость, редкие фризы, Bluetooth-часы/экранные баги, белый экран при шаринге, кривоватая группировка Telegram-уведомлений и нюансы миграции со Smart Switch."}
  gpay: {status: "⚠️", score: 0.8, note: "Должно работать на US/Global; проверить Play Integrity."}
