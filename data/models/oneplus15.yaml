  value: {status: "✅", score: 1, note: "67-68к на WB, отзыв о покупке за 62к; долгий обзор называет около 50к и сильным value, если не нужна лучшая камера."}
  quick_photo: {status: "⚠️", score: 0.66, note: "Plus Key и жесты на выключенном экране есть; speed-test показал быстрый shutter. Быстрый снимок всё равно проверять вечером/в помещении: ночной ширик/tele, HDR и стабилизация видео слабее конкурентов."}
  battery_hike: {status: "✅", score: 0.96, note: "7300 мАч; обзоры хвалят автономность: полтора-два дня и 8-12 ч экрана обычны, у долгого владельца 10-14 ч экрана, рекорд 14,5 ч за 2 дня, в сравнении с Poco давал 10-12 ч, в стресс-тесте против iPhone/Samsung прожил 13 ч 47 мин. GPS-сценарий всё ещё проверить отдельно."}
  ergonomics: {status: "⚠️", score: 0.6, note: "211-218 г; крупный, но плоский экран, компактный блок камер и текстурная спинка делают хват приятнее, чем у многих лопат/Vivo-шайб; часть владельцев всё равно ругает рубленые грани, ширину, высокое расположение кнопок и потерю старого Alert Slider."}
  durability: {status: "⚠️", score: 0.8, note: "IP66/IP68/IP69/IP69K, Victus 2 по WB, плоский экран проще защищать; спинка практичная по отпечаткам и мелкие следы часто стираются, но следы от ногтей/царапины на покрытии проверить, а Global часто требует сразу докупить чехол."}
  bands: {status: "⚠️", score: 0.82, note: "Global/RU/India обзоры хвалят связь, Wi-Fi, VoLTE/Wi-Fi Calling, NFC и двухдиапазонный GPS L1/L5; один обзор отметил хорошую связь в лифте/парковке. Всё равно сверить bands/eSIM по конкретному SKU, например CPH2749. У прошитого CN есть риск: B20 аппаратно заявлен, но в тесте не цеплялся без отдельной активации/инструкции, агрегацию частот нужно проверять."}
  shortcut: {status: "✅", score: 1, note: "Plus Key / gestures - лучший шанс заменить Bixby."}
  screen_sound: {status: "✅", score: 1, note: "Яркий плоский AMOLED, LTPO, 165 Гц в поддерживаемых играх, хороший ШИМ и физический датчик приближения; стереодинамики громкие. Но на прошитых CN проверить автояркость: есть жалоба, что на солнце Oxygen держит яркость ниже ColorOS."}
